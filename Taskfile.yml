# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

env:
  GO111MODULE: auto

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  # Code Quality
  code:test:
    desc: Run all tests in the project with gotestsum
    cmds:
      - gotestsum --format testname ./...

  code:fmt:
    desc: Format all go files
    cmds:
      - go fmt ./...

  code:lint:
    desc: Run golangci-lint (if installed)
    cmds:
      - golangci-lint run
    ignore_error: true

  # Dependencies
  mod:deps:
    desc: Download and cache all dependencies
    cmds:
      - go mod download

  mod:tidy:
    desc: Remove unused dependencies and clean go.mod
    cmds:
      - go mod tidy

  # Specific Tests
  test:sort:
    desc: Run only sorting algorithm tests
    cmds:
      - gotestsum --format testname ./sort/...

  test:search:
    desc: Run only search algorithm tests
    cmds:
      - gotestsum --format testname ./search/...

  test:linkedlist:
    desc: Run only linked-list algorithm tests
    cmds:
      - gotestsum --format testname ./linkedlist/...

  # Git Hooks
  setup:hooks:
    desc: Setup native git hooks for pre-commit testing
    cmds:
      - mkdir -p .git/hooks
      - |
        cat <<EOF > .git/hooks/pre-commit
        #!/bin/sh
        echo "🔍 Running pre-commit tests..."
        task code:test
        EOF
      - chmod +x .git/hooks/pre-commit
    status:
      - test -f .git/hooks/pre-commit
